<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#c0c0c0">
    <link rel="manifest" href="manifest.json">
    <title>扫雷</title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/board.css">
    <link rel="stylesheet" href="css/themes.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
    <div class="game-window">
        <div class="menu-bar">
            <button class="menu-btn" data-menu="game">游戏</button>
            <button class="menu-btn" data-menu="options">选项</button>
            <button class="menu-btn" data-menu="help">帮助</button>
        </div>
        <div class="game-container">
            <div class="status-bar">
                <div class="mine-counter led-display">
                    <span class="digit">0</span>
                    <span class="digit">0</span>
                    <span class="digit">0</span>
                </div>
                <button class="smiley-btn">&#x1F603;</button>
                <div class="timer led-display">
                    <span class="digit">0</span>
                    <span class="digit">0</span>
                    <span class="digit">0</span>
                </div>
            </div>
            <div class="board-container">
                <div class="board"></div>
            </div>
        </div>
    </div>

    <script src="js/namespace.js"></script>
    <script src="js/config.js"></script>
    <script src="js/engine.js"></script>
    <script src="js/sound.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/timer.js"></script>
    <script src="js/renderer.js"></script>
    <script src="js/input.js"></script>
    <script src="js/endless.js"></script>
    <script src="js/achievements.js"></script>
    <script src="js/stats.js"></script>
    <script src="js/themes.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
